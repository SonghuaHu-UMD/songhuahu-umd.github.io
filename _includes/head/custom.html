{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/images/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<meta name="theme-color" content="#ffffff">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      processEscapes: true,
      tags: 'all'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

{% if page.url == "/" or page.permalink == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Songhua Hu",
  "alternateName": "胡松华",
  "url": "{{ site.url }}/",
  "image": "{{ site.url }}/images/{{ site.author.avatar }}",
  "jobTitle": "Assistant Professor of Transportation Engineering",
  "worksFor": {
    "@type": "CollegeOrUniversity",
    "name": "City University of Hong Kong",
    "url": "https://www.cityu.edu.hk/"
  },
  "alumniOf": [
    { "@type": "CollegeOrUniversity", "name": "University of Maryland, College Park" },
    { "@type": "CollegeOrUniversity", "name": "Tongji University" },
    { "@type": "CollegeOrUniversity", "name": "Huazhong University of Science and Technology" }
  ],
  "email": "mailto:{{ site.author.email }}",
  "sameAs": [
    "{{ site.author.googlescholar }}",
    "{{ site.author.orcid }}",
    "https://github.com/{{ site.author.github }}",
    "https://www.linkedin.com/in/{{ site.author.linkedin }}",
    "{{ site.author.researchgate }}"
  ],
  "knowsAbout": [
    "Crowdsourced Data Mining",
    "Spatiotemporal AI",
    "Network Analysis",
    "Transportation Planning",
    "Human Mobility"
  ]
}
</script>
{% endif %}

<style>
  /* bilingual toggle: hide whichever language is not active */
  html[lang="en"] .lang-zh,
  html:not([lang="zh"]) .lang-zh { display: none !important; }
  html[lang="zh"] .lang-en { display: none !important; }
  /* re-show inline-friendly defaults so spans flow with surrounding text */
  html[lang="en"] .lang-en,
  html[lang="zh"] .lang-zh { display: inline; }
  /* block elements that wrap whole paragraphs */
  .lang-en.block, .lang-zh.block { display: block; }
  html[lang="en"] .lang-zh.block,
  html[lang="zh"] .lang-en.block { display: none !important; }

  #lang-toggle {
    position: fixed;
    top: 0.6em;
    right: 0.6em;
    z-index: 9999;
    background: white;
    border: 1px solid #ccc;
    border-radius: 999px;
    padding: 0.35em 0.95em;
    font-size: 0.85em;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    font-family: inherit;
    color: #333;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  #lang-toggle:hover { background: #f5f5f5; transform: scale(1.05); }
</style>

<script>
  // Set language ASAP to avoid flash of wrong language
  (function () {
    try {
      var saved = localStorage.getItem('siteLang') || 'en';
      document.documentElement.lang = saved;
    } catch (e) { document.documentElement.lang = 'en'; }
  })();

  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.createElement('button');
    btn.id = 'lang-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Switch language');
    function paint() {
      btn.textContent = document.documentElement.lang === 'zh' ? 'EN' : '中文';
    }
    btn.addEventListener('click', function () {
      var next = document.documentElement.lang === 'zh' ? 'en' : 'zh';
      document.documentElement.lang = next;
      try { localStorage.setItem('siteLang', next); } catch (e) {}
      paint();
    });
    paint();
    document.body.appendChild(btn);
  });
</script>

<!-- end custom head snippets -->
