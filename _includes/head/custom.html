{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/images/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<meta name="theme-color" content="#ffffff">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.5/css/academicons.min.css"/>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      processEscapes: true,
      tags: 'all'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

{% if page.url == "/" or page.permalink == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Songhua Hu",
  "alternateName": "胡松华",
  "url": "{{ site.url }}/",
  "image": "{{ site.url }}/images/{{ site.author.avatar }}",
  "jobTitle": "Assistant Professor of Transportation Engineering",
  "worksFor": {
    "@type": "CollegeOrUniversity",
    "name": "City University of Hong Kong",
    "url": "https://www.cityu.edu.hk/"
  },
  "alumniOf": [
    { "@type": "CollegeOrUniversity", "name": "University of Maryland, College Park" },
    { "@type": "CollegeOrUniversity", "name": "Tongji University" },
    { "@type": "CollegeOrUniversity", "name": "Huazhong University of Science and Technology" }
  ],
  "email": "mailto:{{ site.author.email }}",
  "sameAs": [
    "{{ site.author.googlescholar }}",
    "{{ site.author.orcid }}",
    "https://github.com/{{ site.author.github }}",
    "https://www.linkedin.com/in/{{ site.author.linkedin }}",
    "{{ site.author.researchgate }}"
  ],
  "knowsAbout": [
    "Crowdsourced Data Mining",
    "Spatiotemporal AI",
    "Network Analysis",
    "Transportation Planning",
    "Human Mobility"
  ]
}
</script>
{% endif %}

<!-- end custom head snippets -->
