  <rect x="665" y="265" width="285" height="95" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="808" y="302" text-anchor="middle" fill="#3e5e7a" font-size="19" font-weight="700">Complex System Resilience</text>
  <text x="808" y="335" text-anchor="middle" fill="#7a8e9e" font-size="17">Urban Multi-system Networks</text>

  <rect x="665" y="370" width="285" height="95" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="808" y="407" text-anchor="middle" fill="#3e5e7a" font-size="19" font-weight="700">Environmental Health</text>
  <text x="808" y="440" text-anchor="middle" fill="#7a8e9e" font-size="17">Epidemiology · Exposure</text>
