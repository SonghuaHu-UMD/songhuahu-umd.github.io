  <text x="130" y="226" text-anchor="middle" fill="#4a6a5a" font-size="16" font-weight="600">Connected Vehicles</text>

  <rect x="30" y="259" width="200" height="60" rx="10" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
