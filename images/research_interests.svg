<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="#f7f8fa" rx="0"/>

  <!-- ========== ROW 1: DATA ========== -->
  <text x="480" y="38" text-anchor="middle" fill="#5a7a6a" font-size="13" font-weight="600" letter-spacing="3" text-transform="uppercase">DATA SOURCES</text>
  <line x1="180" y1="48" x2="780" y2="48" stroke="#d0d8d4" stroke-width="1"/>

  <!-- Data cards -->
  <!-- Mobile Phones -->
  <rect x="28" y="62" width="168" height="52" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="68" y="83" font-size="18" fill="#5a7a6a">&#128241;</text>
  <text x="88" y="94" fill="#4a6a5a" font-size="12" font-weight="600">Mobile Phones</text>

  <!-- City Cameras -->
  <rect x="210" y="62" width="168" height="52" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="250" y="83" font-size="18" fill="#5a7a6a">&#127909;</text>
  <text x="270" y="94" fill="#4a6a5a" font-size="12" font-weight="600">City Cameras</text>

  <!-- Connected Vehicles -->
  <rect x="392" y="62" width="176" height="52" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="432" y="83" font-size="18" fill="#5a7a6a">&#128663;</text>
  <text x="452" y="94" fill="#4a6a5a" font-size="12" font-weight="600">Connected Vehicles</text>

  <!-- Social Media -->
  <rect x="582" y="62" width="168" height="52" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="622" y="83" font-size="18" fill="#5a7a6a">&#128172;</text>
  <text x="642" y="94" fill="#4a6a5a" font-size="12" font-weight="600">Social Media</text>

  <!-- Crowdsourced Reviews -->
  <rect x="764" y="62" width="168" height="52" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="804" y="83" font-size="18" fill="#5a7a6a">&#11088;</text>
  <text x="821" y="94" fill="#4a6a5a" font-size="12" font-weight="600">Crowdsourced</text>

  <!-- Arrow Data → Methods -->
  <line x1="480" y1="124" x2="480" y2="158" stroke="#b0bfb8" stroke-width="1.5"/>
  <polygon points="474,155 480,165 486,155" fill="#b0bfb8"/>

  <!-- ========== ROW 2: METHODS ========== -->
  <text x="480" y="188" text-anchor="middle" fill="#8a6d4a" font-size="13" font-weight="600" letter-spacing="3">METHODS</text>
  <line x1="180" y1="198" x2="780" y2="198" stroke="#ddd0c2" stroke-width="1"/>

  <!-- Method 1: Crowdsourced Data Mining -->
  <rect x="28" y="215" width="215" height="115" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="48" y="245" font-size="22" fill="#a08060">&#128202;</text>
  <text x="76" y="248" fill="#7a5e3e" font-size="13" font-weight="700">Crowdsourced</text>
  <text x="76" y="266" fill="#7a5e3e" font-size="13" font-weight="700">Data Mining</text>
  <text x="48" y="292" fill="#9a8a7a" font-size="11">Data Fusion · Contextual</text>
  <text x="48" y="308" fill="#9a8a7a" font-size="11">Inference · Bias Correction</text>

  <!-- Method 2: Spatiotemporal AI -->
  <rect x="261" y="215" width="215" height="115" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="281" y="245" font-size="22" fill="#a08060">&#129302;</text>
  <text x="309" y="248" fill="#7a5e3e" font-size="13" font-weight="700">Spatiotemporal AI</text>
  <text x="281" y="278" fill="#9a8a7a" font-size="11">Graph Neural Network</text>
  <text x="281" y="294" fill="#9a8a7a" font-size="11">Computer Vision · LLM</text>

  <!-- Method 3: Network Analysis -->
  <rect x="494" y="215" width="215" height="115" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="514" y="245" font-size="22" fill="#a08060">&#128279;</text>
  <text x="542" y="248" fill="#7a5e3e" font-size="13" font-weight="700">Network Analysis</text>
  <text x="514" y="278" fill="#9a8a7a" font-size="11">Network Modeling</text>
  <text x="514" y="294" fill="#9a8a7a" font-size="11">Network Science · Optimization</text>

  <!-- Method 4: Advanced Statistics -->
  <rect x="727" y="215" width="215" height="115" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="747" y="245" font-size="22" fill="#a08060">&#128200;</text>
  <text x="775" y="248" fill="#7a5e3e" font-size="13" font-weight="700">Advanced Statistics</text>
  <text x="747" y="278" fill="#9a8a7a" font-size="11">Causal Inference</text>
  <text x="747" y="294" fill="#9a8a7a" font-size="11">Nonlinear Regression</text>

  <!-- Arrow Methods → Applications -->
  <line x1="480" y1="340" x2="480" y2="374" stroke="#c2b8a8" stroke-width="1.5"/>
  <polygon points="474,371 480,381 486,371" fill="#c2b8a8"/>

  <!-- ========== ROW 3: APPLICATIONS ========== -->
  <text x="480" y="404" text-anchor="middle" fill="#506880" font-size="13" font-weight="600" letter-spacing="3">APPLICATIONS</text>
  <line x1="180" y1="414" x2="780" y2="414" stroke="#c2ced8" stroke-width="1"/>

  <!-- App 1: Transportation Planning -->
  <rect x="28" y="430" width="215" height="115" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="48" y="460" font-size="22" fill="#6888a0">&#128652;</text>
  <text x="76" y="463" fill="#3e5e7a" font-size="13" font-weight="700">Transportation</text>
  <text x="76" y="481" fill="#3e5e7a" font-size="13" font-weight="700">Planning</text>
  <text x="48" y="507" fill="#7a8e9e" font-size="11">Travel Demand Modeling</text>
  <text x="48" y="523" fill="#7a8e9e" font-size="11">Behavior · Simulation</text>

  <!-- App 2: Policy Evaluation -->
  <rect x="261" y="430" width="215" height="115" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="281" y="460" font-size="22" fill="#6888a0">&#127793;</text>
  <text x="309" y="463" fill="#3e5e7a" font-size="13" font-weight="700">Policy Evaluation</text>
  <text x="281" y="493" fill="#7a8e9e" font-size="11">Transport Decarbonization</text>
  <text x="281" y="509" fill="#7a8e9e" font-size="11">Demand Management</text>

  <!-- App 3: Complex System Resilience -->
  <rect x="494" y="430" width="215" height="115" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="514" y="460" font-size="22" fill="#6888a0">&#128737;</text>
  <text x="542" y="463" fill="#3e5e7a" font-size="13" font-weight="700">Complex System</text>
  <text x="542" y="481" fill="#3e5e7a" font-size="13" font-weight="700">Resilience</text>
  <text x="514" y="507" fill="#7a8e9e" font-size="11">Urban Multi-system</text>
  <text x="514" y="523" fill="#7a8e9e" font-size="11">Network Resilience</text>

  <!-- App 4: Environmental Health -->
  <rect x="727" y="430" width="215" height="115" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="747" y="460" font-size="22" fill="#6888a0">&#127973;</text>
  <text x="775" y="463" fill="#3e5e7a" font-size="13" font-weight="700">Environmental</text>
  <text x="775" y="481" fill="#3e5e7a" font-size="13" font-weight="700">Health</text>
  <text x="747" y="507" fill="#7a8e9e" font-size="11">Epidemiology · Exposure</text>
  <text x="747" y="523" fill="#7a8e9e" font-size="11">Health Disparity</text>

  <!-- Bottom tagline -->
  <line x1="180" y1="590" x2="780" y2="590" stroke="#dce0e4" stroke-width="1"/>
  <text x="480" y="620" text-anchor="middle" fill="#6a7a8a" font-size="14" font-weight="500" font-style="italic">Towards Smart, Sustainable, Resilient, and Equitable Mobility Systems</text>
  <text x="480" y="650" text-anchor="middle" fill="#a0aab4" font-size="11">Songhua Hu · City University of Hong Kong</text>
</svg>
