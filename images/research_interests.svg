  <text x="106" y="99" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">Mobile Phones</text>

  <rect x="206" y="68" width="172" height="50" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="292" y="99" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">City Cameras</text>

  <rect x="392" y="68" width="176" height="50" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="480" y="99" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">Connected Vehicles</text>

  <rect x="582" y="68" width="172" height="50" rx="8" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="668" y="99" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">Social Media</text>

