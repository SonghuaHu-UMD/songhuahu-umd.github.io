  <text x="606" y="487" text-anchor="middle" fill="#3e5e7a" font-size="16" font-weight="700">Complex System</text>
  <text x="606" y="509" text-anchor="middle" fill="#3e5e7a" font-size="16" font-weight="700">Resilience</text>
  <text x="606" y="539" text-anchor="middle" fill="#7a8e9e" font-size="13">Urban Multi-system</text>
  <text x="606" y="557" text-anchor="middle" fill="#7a8e9e" font-size="13">Network Resilience</text>

  <!-- App 4 -->
  <rect x="734" y="452" width="220" height="120" rx="10" fill="#f2f5f8" stroke="#c2ced8" stroke-width="1" filter="url(#s)"/>
  <text x="844" y="487" text-anchor="middle" fill="#3e5e7a" font-size="16" font-weight="700">Environmental</text>
  <text x="844" y="509" text-anchor="middle" fill="#3e5e7a" font-size="16" font-weight="700">Health</text>
  <text x="844" y="539" text-anchor="middle" fill="#7a8e9e" font-size="13">Epidemiology · Exposure</text>
  <text x="844" y="557" text-anchor="middle" fill="#7a8e9e" font-size="13">Health Disparity</text>

