<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ========== COLUMN 1: DATA SOURCES (narrower, w=200) ========== -->
  <text x="130" y="30" text-anchor="middle" fill="#5a7a6a" font-size="22" font-weight="700" letter-spacing="3">DATA SOURCES</text>
  <line x1="30" y1="42" x2="230" y2="42" stroke="#c8d5cd" stroke-width="1"/>

  <rect x="30" y="55" width="200" height="95" rx="10" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="108" text-anchor="middle" fill="#4a6a5a" font-size="19" font-weight="600">Mobile Phones</text>

  <rect x="30" y="160" width="200" height="95" rx="10" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="213" text-anchor="middle" fill="#4a6a5a" font-size="19" font-weight="600">City Cameras</text>

  <rect x="30" y="265" width="200" height="95" rx="10" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="318" text-anchor="middle" fill="#4a6a5a" font-size="19" font-weight="600">Connected Vehicles</text>

  <rect x="30" y="370" width="200" height="95" rx="10" fill="#eef3f0" stroke="#c8d5cd" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="423" text-anchor="middle" fill="#4a6a5a" font-size="19" font-weight="600">Social Media</text>

  <!-- Arrow DATA → METHODS -->
  <line x1="240" y1="260" x2="290" y2="260" stroke="#b0bfb8" stroke-width="2"/>
  <polygon points="287,253 300,260 287,267" fill="#b0bfb8"/>

  <!-- ========== COLUMN 2: METHODS (wider, w=285) ========== -->
  <text x="448" y="30" text-anchor="middle" fill="#8a6d4a" font-size="22" font-weight="700" letter-spacing="3">METHODS</text>
  <line x1="305" y1="42" x2="590" y2="42" stroke="#ddd0c2" stroke-width="1"/>

  <rect x="305" y="55" width="285" height="95" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="448" y="92" text-anchor="middle" fill="#7a5e3e" font-size="19" font-weight="700">Crowdsourced Data Mining</text>
  <text x="448" y="125" text-anchor="middle" fill="#9a8a7a" font-size="17">Data Fusion · Bias Correction</text>

  <rect x="305" y="160" width="285" height="95" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="448" y="197" text-anchor="middle" fill="#7a5e3e" font-size="19" font-weight="700">Spatiotemporal AI</text>
  <text x="448" y="230" text-anchor="middle" fill="#9a8a7a" font-size="17">GNN · Computer Vision · LLM</text>

  <rect x="305" y="265" width="285" height="95" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="448" y="302" text-anchor="middle" fill="#7a5e3e" font-size="19" font-weight="700">Network Analysis</text>
  <text x="448" y="335" text-anchor="middle" fill="#9a8a7a" font-size="17">Modeling · Optimization</text>

  <rect x="305" y="370" width="285" height="95" rx="10" fill="#faf6f1" stroke="#ddd0c2" stroke-width="1" filter="url(#s)"/>
  <text x="448" y="407" text-anchor="middle" fill="#7a5e3e" font-size="19" font-weight="700">Advanced Statistics</text>
  <text x="448" y="440" text-anchor="middle" fill="#9a8a7a" font-size="17">Causal Inference · Regression</text>

  <!-- Arrow METHODS → APPLICATIONS -->
  <line x1="600" y1="260" x2="650" y2="260" stroke="#c2b8a8" stroke-width="2"/>
  <polygon points="647,253 660,260 647,267" fill="#c2b8a8"/>

