<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="methodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d35400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="#fafbfc" rx="0"/>

  <!-- ========== ROW 1: DATA ========== -->
  <text x="500" y="45" text-anchor="middle" fill="#1e8449" font-size="22" font-weight="bold" letter-spacing="2">DATA</text>

  <!-- Data item 1 -->
  <rect x="30" y="65" width="175" height="55" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="117" y="98" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Mobile Phones</text>

  <!-- Data item 2 -->
  <rect x="225" y="65" width="175" height="55" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="312" y="98" text-anchor="middle" fill="white" font-size="15" font-weight="bold">City Cameras</text>

  <!-- Data item 3 -->
  <rect x="420" y="65" width="175" height="55" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="507" y="91" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Connected</text>
  <text x="507" y="110" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Vehicles</text>

  <!-- Data item 4 -->
  <rect x="615" y="65" width="175" height="55" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="702" y="98" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Social Media</text>

  <!-- Data item 5 -->
  <rect x="810" y="65" width="175" height="55" rx="10" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="897" y="91" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Crowdsourced</text>
  <text x="897" y="110" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Reviews</text>

  <!-- Arrow: Data → Methods -->
  <line x1="500" y1="130" x2="500" y2="170" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- ========== ROW 2: METHODS ========== -->
  <text x="500" y="205" text-anchor="middle" fill="#d35400" font-size="22" font-weight="bold" letter-spacing="2">METHODS</text>

  <!-- Method 1 -->
  <rect x="30" y="225" width="220" height="120" rx="12" fill="url(#methodGrad)" filter="url(#shadow)"/>
  <text x="140" y="260" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Crowdsourced</text>
  <text x="140" y="282" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Data Mining</text>
  <text x="140" y="310" text-anchor="middle" fill="#fdebd0" font-size="12">Data Fusion · Contextual</text>
  <text x="140" y="328" text-anchor="middle" fill="#fdebd0" font-size="12">Inference · Bias Correction</text>

  <!-- Method 2 -->
  <rect x="275" y="225" width="220" height="120" rx="12" fill="url(#methodGrad)" filter="url(#shadow)"/>
  <text x="385" y="265" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Spatiotemporal AI</text>
  <text x="385" y="300" text-anchor="middle" fill="#fdebd0" font-size="12">Graph Neural Network</text>
  <text x="385" y="318" text-anchor="middle" fill="#fdebd0" font-size="12">Computer Vision · LLM</text>

  <!-- Method 3 -->
  <rect x="520" y="225" width="220" height="120" rx="12" fill="url(#methodGrad)" filter="url(#shadow)"/>
  <text x="630" y="265" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Network Analysis</text>
  <text x="630" y="300" text-anchor="middle" fill="#fdebd0" font-size="12">Network Modeling</text>
  <text x="630" y="318" text-anchor="middle" fill="#fdebd0" font-size="12">Network Science · Optimization</text>

  <!-- Method 4 -->
  <rect x="765" y="225" width="220" height="120" rx="12" fill="url(#methodGrad)" filter="url(#shadow)"/>
  <text x="875" y="260" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Advanced</text>
  <text x="875" y="282" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Statistics</text>
  <text x="875" y="310" text-anchor="middle" fill="#fdebd0" font-size="12">Causal Inference</text>
  <text x="875" y="328" text-anchor="middle" fill="#fdebd0" font-size="12">Nonlinear Regression</text>

  <!-- Arrow: Methods → Applications -->
  <line x1="500" y1="355" x2="500" y2="395" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <!-- ========== ROW 3: APPLICATIONS ========== -->
  <text x="500" y="430" text-anchor="middle" fill="#1a5276" font-size="22" font-weight="bold" letter-spacing="2">APPLICATIONS</text>

  <!-- App 1 -->
  <rect x="30" y="450" width="220" height="120" rx="12" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="140" y="480" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Transportation</text>
  <text x="140" y="502" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Planning</text>
  <text x="140" y="530" text-anchor="middle" fill="#d6eaf8" font-size="12">Travel Demand Modeling</text>
  <text x="140" y="548" text-anchor="middle" fill="#d6eaf8" font-size="12">Behavior · Simulation</text>

  <!-- App 2 -->
  <rect x="275" y="450" width="220" height="120" rx="12" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="385" y="485" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Policy Evaluation</text>
  <text x="385" y="520" text-anchor="middle" fill="#d6eaf8" font-size="12">Transport Decarbonization</text>
  <text x="385" y="538" text-anchor="middle" fill="#d6eaf8" font-size="12">Demand Management</text>

  <!-- App 3 -->
  <rect x="520" y="450" width="220" height="120" rx="12" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="630" y="480" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Complex System</text>
  <text x="630" y="502" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Resilience</text>
  <text x="630" y="530" text-anchor="middle" fill="#d6eaf8" font-size="12">Urban Multi-system</text>
  <text x="630" y="548" text-anchor="middle" fill="#d6eaf8" font-size="12">Network Resilience</text>

  <!-- App 4 -->
  <rect x="765" y="450" width="220" height="120" rx="12" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="875" y="480" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Environmental</text>
  <text x="875" y="502" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Health</text>
  <text x="875" y="530" text-anchor="middle" fill="#d6eaf8" font-size="12">Epidemiology · Exposure</text>
  <text x="875" y="548" text-anchor="middle" fill="#d6eaf8" font-size="12">Health Disparity</text>

  <!-- Bottom tagline -->
  <text x="500" y="640" text-anchor="middle" fill="#2c3e50" font-size="18" font-weight="bold">Towards Smart, Sustainable, Resilient, and Equitable Mobility Systems</text>

  <!-- Decorative line -->
  <line x1="150" y1="660" x2="850" y2="660" stroke="#bdc3c7" stroke-width="1"/>
  <text x="500" y="690" text-anchor="middle" fill="#95a5a6" font-size="13">Songhua Hu · City University of Hong Kong</text>
</svg>
