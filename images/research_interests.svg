  <text x="854" y="92" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">Crowdsourced</text>
  <text x="854" y="110" text-anchor="middle" fill="#4a6a5a" font-size="15" font-weight="600">Reviews</text>

